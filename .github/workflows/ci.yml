name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ktlint)
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Gradle Wrapper Validation
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: "21"

      - name: Set up Gradle Cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

      - name: Ktlint Check
        run: ./gradlew --no-daemon ktlintCheck

  build_test:
    name: Build & Test (Gradle)
    runs-on: ubuntu-latest
    needs:
      - lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: "21"

      - name: Set up Gradle Cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

      - name: Build and Test
        run: ./gradlew --no-daemon clean test build
      - name: Upload Gradle Test Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gradle-test-report
          path: build/reports/tests/test
