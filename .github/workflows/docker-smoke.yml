name: Docker Smoke

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: docker-smoke-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  docker_smoke:
    name: Docker Smoke Test
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build App Image with Cache
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: narada-app:local
          cache-from: type=gha,scope=docker-smoke
          cache-to: type=gha,mode=max,scope=docker-smoke

      - name: Docker Compose Start (No Build)
        run: docker compose up -d --no-build

      - name: Wait for Health
        run: |
          status="starting"
          for _ in $(seq 1 30); do
            status=$(docker inspect --format='{{.State.Health.Status}}' narada-app || echo "missing")
            if [ "$status" = "healthy" ]; then
              break
            fi
            sleep 3
          done
          test "$status" = "healthy"

      - name: Capture Smoke Summary
        if: always()
        run: |
          mkdir -p artifacts
          docker compose ps > artifacts/compose-ps.txt
          docker inspect --format='{{json .State.Health}}' narada-app > artifacts/app-health.json || true
          curl -fsS http://127.0.0.1:7621/actuator/health > artifacts/actuator-health.json || true
          docker compose logs app > artifacts/app.log || true
          docker compose logs postgres > artifacts/postgres.log || true

      - name: Upload Smoke Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docker-smoke-summary
          path: artifacts

      - name: Teardown
        if: always()
        run: docker compose down -v
