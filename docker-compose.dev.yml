name: narada-dev

services:
  postgres:
    image: postgres:17-alpine
    container_name: narada-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: ${POSTGRES_PIDS_LIMIT:-256}
    mem_limit: ${POSTGRES_MEM_LIMIT:-512m}
    mem_reservation: ${POSTGRES_MEM_RESERVATION:-256m}
    cpus: "${POSTGRES_CPUS_LIMIT:-1.0}"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-narada}
      POSTGRES_USER: ${POSTGRES_USER:-narada}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-narada_dev_password}
    ports:
      - "${POSTGRES_PORT:-7622}:5432"
    volumes:
      - narada-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-narada} -d ${POSTGRES_DB:-narada}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - narada-net

volumes:
  narada-postgres-data:

networks:
  narada-net:
    name: narada-net
